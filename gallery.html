<!DOCTYPE HTML>
<html>
	<head>
		<title>Gallery | Never Give Up</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<style>
			/* Custom Gallery Grid Styles */
			.gallery-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
				gap: 20px;
				margin-top: 2em;
			}
			.gallery-item {
				width: 100%;
				height: 250px; /* Uniform height for both images and videos */
				object-fit: cover; /* Prevents stretching */
				border-radius: 8px;
				box-shadow: 0 4px 6px rgba(0,0,0,0.1);
				transition: transform 0.3s ease;
				background-color: #000; /* Dark background for videos */
			}
			img.gallery-item:hover {
				transform: scale(1.05); /* Zoom effect only on images */
			}
		</style>
	</head>
	<body class="no-sidebar is-preload">
		<div id="page-wrapper">

			<section id="header" class="wrapper">
					<div id="logo">
							<h1><a href="index.html">NEVER GIVE UP</a></h1>
							<p>Client Results & Training Gallery</p>
						</div>

					<nav id="nav">
							<ul>
								<li><a href="index.html">Home</a></li>
								<li><a href="index.html#main">About</a></li>
								<li><a href="index.html#highlights">Services</a></li>
								<li class="current"><a href="gallery.html">Gallery</a></li>
								<li><a href="index.html#footer">Contact</a></li>
							</ul>
						</nav>
				</section>

			<section id="main" class="wrapper style2">
					<div class="title">Training Gallery</div>
					<div class="container">
						<header class="style1">
							<h2>Success Stories & Training in Action</h2>
							<p>A look into the Never Give Up community.</p>
						</header>

						<div class="gallery-grid" id="dynamic-gallery"></div>
						
					</div>
				</section>

			<section id="footer" class="wrapper">
					<div class="title">Get In Touch</div>
					<div class="container">
						<div id="copyright">
							<ul>
								<li>&copy; Never Give Up with Naveed.</li><li>Design: <a href="http://html5up.net">HTML5 UP</a></li>
							</ul>
						</div>
					</div>
				</section>
		</div>

		<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/jquery.dropotron.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>

			<script>
				// 1. Define your media here!
					const mediaFiles = [
					    { type: 'image', filename: '1.jpeg' },
					    { type: 'image', filename: '5.jpeg' },
					    { type: 'image', filename: '7.jpeg' },
					    { type: 'image', filename: '8.jpeg' },
					    { type: 'image', filename: '9.jpeg' },
					    { type: 'image', filename: '11.jpeg' },
					    { type: 'image', filename: '12.jpeg' },
					    { type: 'image', filename: '13.jpeg' },
					    { type: 'image', filename: '14.jpeg' },
					    { type: 'image', filename: '15.jpeg' },
					    { type: 'image', filename: '16.jpeg' },
					    { type: 'image', filename: '17.jpeg' },
					    { type: 'image', filename: '18.jpeg' },
					    { type: 'image', filename: '19.jpeg' },
					    { type: 'image', filename: '20.jpeg' },
					    { type: 'video', filename: '111.mp4' },
					    { type: 'image', filename: '221.jpeg' },
					    { type: 'image', filename: '222.jpeg' },
					    { type: 'video', filename: '222.mp4' },
					    { type: 'video', filename: '333.mp4' },
					    { type: 'video', filename: '444.mp4' },
					    { type: 'image', filename: '1111.jpeg' },
					    { type: 'image', filename: '11111.jpeg' },
					    { type: 'image', filename: 'WhatsApp Image 2026-01-14 at 20.27.12.jpeg' },
					    { type: 'image', filename: 'WhatsApp Image 2026-01-25 at 23.02.56.jpeg' },
					    { type: 'image', filename: 'WhatsApp Image 2026-01-25 at 23.02.57.jpeg' },
					    { type: 'image', filename: 'WhatsApp Image 2026-02-05 at 1.jpeg' },
					    { type: 'image', filename: 'WhatsApp Image 2026-02-05 at 13.47.25.jpeg' },
					    { type: 'image', filename: 'WhatsApp Image 2026-02-05 at 13.47.26.jpeg' },
					    { type: 'image', filename: 'WhatsApp Image 2026-02-05 at 13.47.27.jpeg' },
					    { type: 'image', filename: 'WhatsApp Image 2026-02-05 at 13.47.28.jpeg' },
					    { type: 'image', filename: 'WhatsApp Image 2026-02-05 at 13.52.21.jpeg' },
					    { type: 'video', filename: 'WhatsApp Video 2026-01-14 at 20.32.26.mp4' },
					    { type: 'video', filename: 'WhatsApp Video 2026-01-14 at 20.32.27.mp4' }
					];

				// 2. The code below does the heavy lifting to display them
				const galleryContainer = document.getElementById('dynamic-gallery');
				const folderPath = 'gallery/'; // The folder where your files are stored

				mediaFiles.forEach(media => {
					let mediaElement;

					if (media.type === 'image') {
						mediaElement = document.createElement('img');
						mediaElement.src = folderPath + media.filename;
						mediaElement.alt = "Never Give Up Training Gallery";
						mediaElement.className = 'gallery-item';
					} 
					else if (media.type === 'video') {
						mediaElement = document.createElement('video');
						mediaElement.src = folderPath + media.filename;
						mediaElement.className = 'gallery-item';
						mediaElement.controls = true; // Adds play/pause buttons
						mediaElement.muted = true;    // Mutes by default (good for auto-play scenarios)
					}

					if (mediaElement) {
						galleryContainer.appendChild(mediaElement);
					}
				});
			</script>
	</body>
</html>
