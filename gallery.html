<!DOCTYPE HTML>
<html>
	<head>
		<title>Gallery | Never Give Up</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<style>
			/* Custom Gallery Grid Styles */
			.gallery-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
				gap: 20px;
				margin-top: 2em;
			}
			.gallery-item {
				width: 100%;
				height: 250px;
				object-fit: cover;
				border-radius: 8px;
				box-shadow: 0 4px 6px rgba(0,0,0,0.1);
				transition: transform 0.3s ease;
				background-color: #000;
				cursor: pointer;
			}
			img.gallery-item:hover, video.gallery-item:hover {
				transform: scale(1.05);
			}

			/* --- Modal / Lightbox Styles --- */
			.modal {
				display: none; 
				position: fixed;
				z-index: 10000; 
				padding-top: 50px;
				left: 0;
				top: 0;
				width: 100%;
				height: 100%;
				background-color: rgba(0, 0, 0, 0.9);
			}
			.modal-content {
				margin: auto;
				display: block;
				max-width: 90%;
				max-height: 80vh;
				border-radius: 8px;
			}
			.close {
				position: absolute;
				top: 15px;
				right: 35px;
				color: #f1f1f1;
				font-size: 40px;
				font-weight: bold;
				cursor: pointer;
				transition: 0.3s;
				z-index: 10001;
			}
			.close:hover, .close:focus {
				color: #bbb;
				text-decoration: none;
			}

			/* --- NEW: Navigation Arrows --- */
			.nav-arrow {
				cursor: pointer;
				position: absolute;
				top: 50%;
				width: auto;
				padding: 16px;
				margin-top: -50px;
				color: white;
				font-weight: bold;
				font-size: 40px;
				transition: 0.3s ease;
				border-radius: 0 3px 3px 0;
				user-select: none;
				z-index: 10001;
			}
			.nav-arrow.prev { left: 20px; }
			.nav-arrow.next { right: 20px; border-radius: 3px 0 0 3px; }
			.nav-arrow:hover { background-color: rgba(0, 0, 0, 0.8); }
			
			/* Adjust arrow positioning for mobile screens */
			@media only screen and (max-width: 700px) {
				.nav-arrow { font-size: 30px; padding: 10px; }
				.nav-arrow.prev { left: 0px; }
				.nav-arrow.next { right: 0px; }
			}
		</style>
	</head>
	<body class="no-sidebar is-preload">
		<div id="page-wrapper">

			<section id="header" class="wrapper">
						<div id="logo">
							<h1><a href="index.html">NEVER GIVE UP</a></h1>
							<p>Client Results & Training Gallery</p>
						</div>
						<nav id="nav">
							<ul>
								<li><a href="index.html">Home</a></li>
								<li><a href="index.html#main">About</a></li>
								<li><a href="index.html#highlights">Services</a></li>
								<li class="current"><a href="gallery.html">Gallery</a></li>
								<li><a href="index.html#footer">Contact</a></li>
							</ul>
						</nav>
				</section>

			<section id="main" class="wrapper style2">
					<div class="title">Training Gallery</div>
					<div class="container">
						<header class="style1">
							<h2>Success Stories & Training in Action</h2>
							<p>Click to expand. Use your arrow keys to scroll through.</p>
						</header>

						<div class="gallery-grid" id="dynamic-gallery"></div>
					</div>
				</section>

			<section id="footer" class="wrapper">
					<div class="title">Get In Touch</div>
					<div class="container">
						<div id="copyright">
							<ul>
								<li>&copy; Never Give Up with Naveed.</li><li>Design: <a href="http://html5up.net">HTML5 UP</a></li>
							</ul>
						</div>
					</div>
				</section>
		</div>

		<div id="mediaModal" class="modal">
			<span class="close" id="closeModal">&times;</span>
			
			<a class="nav-arrow prev" onclick="changeMedia(-1)">&#10094;</a>
			<a class="nav-arrow next" onclick="changeMedia(1)">&#10095;</a>

			<img class="modal-content" id="imgPreview" style="display:none;">
			<video class="modal-content" id="vidPreview" controls style="display:none;"></video>
		</div>

		<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/jquery.dropotron.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>

			<script>
				const mediaFiles = [
					{ type: 'image', filename: '1.jpeg' },
					{ type: 'image', filename: '5.jpeg' },
					{ type: 'image', filename: '7.jpeg' },
					{ type: 'image', filename: '8.jpeg' },
					{ type: 'image', filename: '9.jpeg' },
					{ type: 'image', filename: '11.jpeg' },
					{ type: 'image', filename: '12.jpeg' },
					{ type: 'image', filename: '13.jpeg' },
					{ type: 'image', filename: '14.jpeg' },
					{ type: 'image', filename: '15.jpeg' },
					{ type: 'image', filename: '16.jpeg' },
					{ type: 'image', filename: '17.jpeg' },
					{ type: 'image', filename: '18.jpeg' },
					{ type: 'image', filename: '19.jpeg' },
					{ type: 'image', filename: '20.jpeg' },
					{ type: 'video', filename: '111.mp4' },
					{ type: 'image', filename: '221.jpeg' },
					{ type: 'image', filename: '222.jpeg' },
					{ type: 'video', filename: '222.mp4' },
					{ type: 'video', filename: '333.mp4' },
					{ type: 'video', filename: '444.mp4' },
					{ type: 'image', filename: '1111.jpeg' },
					{ type: 'image', filename: '11111.jpeg' },
					{ type: 'image', filename: 'WhatsApp Image 2026-01-14 at 20.27.12.jpeg' },
					{ type: 'image', filename: 'WhatsApp Image 2026-01-25 at 23.02.56.jpeg' },
					{ type: 'image', filename: 'WhatsApp Image 2026-01-25 at 23.02.57.jpeg' },
					{ type: 'image', filename: 'WhatsApp Image 2026-02-05 at 1.jpeg' },
					{ type: 'image', filename: 'WhatsApp Image 2026-02-05 at 13.47.25.jpeg' },
					{ type: 'image', filename: 'WhatsApp Image 2026-02-05 at 13.47.26.jpeg' },
					{ type: 'image', filename: 'WhatsApp Image 2026-02-05 at 13.47.27.jpeg' },
					{ type: 'image', filename: 'WhatsApp Image 2026-02-05 at 13.47.28.jpeg' },
					{ type: 'image', filename: 'WhatsApp Image 2026-02-05 at 13.52.21.jpeg' },
					{ type: 'video', filename: '555.mp4' },
					{ type: 'video', filename: '666.mp4' }
				];

				const galleryContainer = document.getElementById('dynamic-gallery');
				const folderPath = 'gallery/'; 

				const modal = document.getElementById('mediaModal');
				const modalImg = document.getElementById('imgPreview');
				const modalVid = document.getElementById('vidPreview');
				const spanClose = document.getElementById('closeModal');
				
				// Keep track of what we are currently looking at
				let currentIndex = 0;

				// 1. Build the initial grid
				mediaFiles.forEach((media, index) => {
					let mediaElement;
					let fullPath = folderPath + media.filename;

					if (media.type === 'image') {
						mediaElement = document.createElement('img');
						mediaElement.src = fullPath;
					} else if (media.type === 'video') {
						mediaElement = document.createElement('video');
						mediaElement.src = fullPath;
						mediaElement.muted = true;
					}

					if (mediaElement) {
						mediaElement.className = 'gallery-item';
						// Tell the click event exactly which index it represents
						mediaElement.onclick = function() {
							openModal(index); 
						}
						galleryContainer.appendChild(mediaElement);
					}
				});

				// 2. Function to Open Modal at a specific index
				function openModal(index) {
					currentIndex = index;
					modal.style.display = "block";
					updateModalContent();
				}

				// 3. Function to Change Media (Next/Prev)
				function changeMedia(direction) {
					currentIndex += direction;
					
					// Loop back to the beginning or end if we go out of bounds
					if (currentIndex >= mediaFiles.length) {
						currentIndex = 0;
					} else if (currentIndex < 0) {
						currentIndex = mediaFiles.length - 1;
					}
					
					updateModalContent();
				}

				// 4. Function that actually swaps the picture/video on screen
				function updateModalContent() {
					let media = mediaFiles[currentIndex];
					let fullPath = folderPath + media.filename;

					// Always pause and clear video when swapping
					modalVid.pause();
					modalVid.removeAttribute('src');
					modalVid.load();

					if (media.type === 'image') {
						modalVid.style.display = "none";
						modalImg.src = fullPath;
						modalImg.style.display = "block";
					} else if (media.type === 'video') {
						modalImg.style.display = "none";
						modalVid.style.display = "block";
						modalVid.src = fullPath;
						modalVid.load();
						
						let playPromise = modalVid.play();
						if (playPromise !== undefined) {
							playPromise.catch(error => { console.log("Auto-play prevented."); });
						}
					}
				}

				// 5. Keyboard Events (Arrow Keys and Escape)
				document.addEventListener('keydown', function(event) {
					// Only trigger if the modal is currently open
					if (modal.style.display === "block") {
						if (event.key === "ArrowLeft") {
							changeMedia(-1);
						} else if (event.key === "ArrowRight") {
							changeMedia(1);
						} else if (event.key === "Escape") {
							closeModalFunc();
						}
					}
				});

				// 6. Close Modal Logic
				spanClose.onclick = closeModalFunc;
				// Close if clicking the dark background (but not the arrows/image)
				window.onclick = function(event) {
					if (event.target == modal) {
						closeModalFunc();
					}
				}

				function closeModalFunc() {
					modal.style.display = "none";
					modalVid.pause(); 
					modalVid.removeAttribute('src'); 
					modalVid.load(); 
				}
			</script>
	</body>
</html>
